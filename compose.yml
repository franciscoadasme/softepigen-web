services:
  web:
    build:
      context: .
      args:
        APP_UID: '${APP_UID:-1000}'
        APP_GID: '${APP_GID:-1000}'
    image: '${APP_IMAGE:-localhost/softepigen:latest}'
    ports:
      - '127.0.0.1:${PORT:-18000}:8080'
    env_file:
      - .env
    volumes:
      - ./storage:/var/www/html/storage:z
      - ./database:/var/www/html/database:z
      - '${JOB_SUBMISSION_SPOOL:-/data/softepigen}:${JOB_SUBMISSION_SPOOL:-/data/softepigen}:z'
    restart: unless-stopped

  queue:
    image: '${APP_IMAGE:-localhost/softepigen:latest}'
    command:
      ['php', 'artisan', 'queue:work', '--sleep=3', '--tries=3', '--timeout=90']
    env_file:
      - .env
    volumes:
      - ./storage:/var/www/html/storage:z
      - ./database:/var/www/html/database:z
      - '${JOB_SUBMISSION_SPOOL:-/data/softepigen}:${JOB_SUBMISSION_SPOOL:-/data/softepigen}:z'
    restart: unless-stopped

  schedule:
    image: '${APP_IMAGE:-localhost/softepigen:latest}'
    command: ['php', 'artisan', 'schedule:work']
    env_file:
      - .env
    volumes:
      - ./storage:/var/www/html/storage:z
      - ./database:/var/www/html/database:z
      - '${JOB_SUBMISSION_SPOOL:-/data/softepigen}:${JOB_SUBMISSION_SPOOL:-/data/softepigen}:z'
    restart: unless-stopped
